# ===========================================
# Application Configuration
# ===========================================
spring.application.name=devops-java-app
app.version=1.0.0
app.environment=${APP_ENVIRONMENT:development}

# ===========================================
# Server Configuration
# ===========================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ===========================================
# Database Configuration (H2 for dev, PostgreSQL for prod)
# ===========================================
# H2 Database (Default - Development)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:devopsdb}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=${JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# Actuator Configuration (For Kubernetes Probes & Monitoring)
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.tags.application=${spring.application.name}

# ===========================================
# Logging Configuration
# ===========================================
logging.level.root=INFO
logging.level.com.devops.training=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=${LOG_PATH:/var/log/app}/application.log

# ===========================================
# OpenAPI/Swagger Configuration
# ===========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
