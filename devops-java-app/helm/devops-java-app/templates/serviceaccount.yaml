{{/*
============================================
Kubernetes ServiceAccount Template
============================================

Interview Questions:
1. What is a ServiceAccount in Kubernetes?
2. How does RBAC work with ServiceAccounts?
3. What is the difference between ServiceAccount and User accounts?
4. How do pods authenticate with the Kubernetes API?
*/}}

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devops-java-app.serviceAccountName" . }}
  labels:
    {{- include "devops-java-app.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
