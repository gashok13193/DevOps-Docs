{{/*
============================================
Prometheus ServiceMonitor Template
============================================

Interview Questions:
1. What is a ServiceMonitor in Prometheus Operator?
2. How does Prometheus discover targets to scrape?
3. What is the relationship between ServiceMonitor and Prometheus?
4. How do you configure scrape intervals and timeouts?
*/}}

{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "devops-java-app.fullname" . }}
  labels:
    {{- include "devops-java-app.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "devops-java-app.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
