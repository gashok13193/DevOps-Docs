# ============================================
# Staging Environment Values
# ============================================

app:
  name: devops-java-app
  environment: staging

replicaCount: 2

image:
  repository: registry.company.com/devops-java-app
  tag: "1.0.0"
  pullPolicy: Always

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: staging-api.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: staging-api-tls
      hosts:
        - staging-api.company.com

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "staging"
  - name: SERVER_PORT
    value: "8080"
  - name: LOG_LEVEL
    value: "INFO"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
